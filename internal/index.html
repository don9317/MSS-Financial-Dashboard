<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MSS Hybrid Dashboard V3 (Debug + Drilldown)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: Arial; background:#f5f7fb; margin:0; padding:20px; }
.card { background:#fff; padding:15px; border-radius:10px; margin-bottom:15px; box-shadow:0 2px 8px rgba(0,0,0,0.05);}
h2 { margin-top:0; }
.grid { display:grid; grid-template-columns: repeat(4,1fr); gap:10px; }
select { padding:8px; }
table { width:100%; border-collapse: collapse; }
th, td { padding:8px; border-bottom:1px solid #ddd; font-size:12px; }
th { background:#f0f3f8; }
</style>
</head>
<body>

<div class="card">
<h2>Filters</h2>
<div class="grid">
<select id="typeFilter">
<option value="All">All Types</option>
<option value="Rental">Rental</option>
<option value="Rental Package">Rental Package</option>
<option value="Camp">Camp</option>
<option value="League/Tournament">League/Tournament</option>
<option value="Membership">Membership</option>
<option value="Cancellation Fee">Cancellation Fee</option>
</select>

<select id="sourceFilter">
<option value="All">All Sources</option>
<option value="Stripe">Stripe</option>
<option value="MSS">MSS</option>
<option value="Stripe Only">Stripe Only</option>
<option value="Offline Only">Offline Only</option>
</select>

<select id="matchFilter">
<option value="All">All Match Status</option>
<option value="Matched">Matched</option>
<option value="Unmatched">Unmatched</option>
</select>
</div>
</div>

<div class="card">
<h2>Debug Summary</h2>
<div id="debugSummary"></div>
</div>

<div class="card">
<h2>Transaction Detail</h2>
<table id="table">
<thead>
<tr>
<th>Date</th>
<th>Source</th>
<th>Type</th>
<th>Amount</th>
<th>Status</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script>
let data = [];

function render(){
 let type = document.getElementById('typeFilter').value;
 let source = document.getElementById('sourceFilter').value;
 let match = document.getElementById('matchFilter').value;

 let filtered = data.filter(r=>{
   if(type!=='All' && r.type!==type) return false;
   if(source!=='All' && r.source!==source) return false;
   if(match==='Matched' && !r.matched) return false;
   if(match==='Unmatched' && r.matched) return false;
   return true;
 });

 let tbody = document.querySelector("#table tbody");
 tbody.innerHTML='';
 filtered.forEach(r=>{
   let tr=document.createElement('tr');
   tr.innerHTML=`<td>${r.date}</td><td>${r.source}</td><td>${r.type}</td><td>${r.amount}</td><td>${r.matched?'Matched':'Unmatched'}</td>`;
   tbody.appendChild(tr);
 });

 let total = filtered.reduce((a,b)=>a+b.amount,0);
 document.getElementById('debugSummary').innerText = "Rows: "+filtered.length+" | Total: $"+total.toFixed(2);
}

document.querySelectorAll("select").forEach(el=>el.onchange=render);

// sample placeholder
data = [
 {date:'2026-02-01',source:'Stripe',type:'Rental',amount:100,matched:true},
 {date:'2026-02-02',source:'MSS',type:'Rental',amount:100,matched:true},
 {date:'2026-02-03',source:'Stripe',type:'Camp',amount:200,matched:false}
];

render();
</script>

</body>
</html>
