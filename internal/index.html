<!DOCTYPE html>
<html>
<head>
<title>MSS Financial Dashboard V5</title>
</head>
<body>

<h2>MSS Financial Dashboard V5 (Reservation ID Matching)</h2>

<input type="file" id="stripeFile">
<input type="file" id="mssFile">
<button onclick="load()">Load</button>

<pre id="output"></pre>

<script>
function normalize(id){
  return (id||"").toString().toUpperCase().replace(/[^A-Z0-9]/g,'')
}

function extractStripeId(row){
  let text = JSON.stringify(row)

  let metaMatch = text.match(/"reservationId":"([^"]+)"/i)
  if(metaMatch) return normalize(metaMatch[1])

  let descMatch = text.match(/Reservation Id:\s*([A-Z0-9]+)/i)
  if(descMatch) return normalize(descMatch[1])

  return ""
}

function extractMssId(row){
  let id = row["Reservation Ids"] || ""
  return normalize(id)
}

function parseCSV(text){
  let rows = text.split("\n").map(r=>r.split(","))
  let headers = rows[0]
  return rows.slice(1).map(r=>{
    let obj={}
    headers.forEach((h,i)=>obj[h]=r[i])
    return obj
  })
}

async function load(){
  let stripeFile = document.getElementById("stripeFile").files[0]
  let mssFile = document.getElementById("mssFile").files[0]

  let stripe = parseCSV(await stripeFile.text())
  let mss = parseCSV(await mssFile.text())

  let mssMap = {}

  mss.forEach(r=>{
    let id = extractMssId(r)
    if(id) mssMap[id]=r
  })

  let matched=0
  let unmatched=0

  stripe.forEach(r=>{
    let id = extractStripeId(r)
    if(id && mssMap[id]){
      matched++
    } else {
      unmatched++
    }
  })

  document.getElementById("output").innerText =
    "Matched: " + matched + "\nUnmatched: " + unmatched
}
</script>

</body>
</html>
